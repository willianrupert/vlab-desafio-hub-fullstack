name: V-LAB Hub CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest httpx
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Análise de Código (Linting com flake8)
      run: |
        # Para a build se houver erros graves de sintaxe
        flake8 backend/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Trata outros erros como avisos (não falha o CI)
        flake8 backend/ tests/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

    - name: Testes Automatizados (pytest)
      env:
        # Passamos variáveis dummy para os testes não falharem à procura do .env
        GEMINI_API_KEY: "dummy_key"
        OPENAI_API_KEY: "dummy_key"
      run: |
        pytest tests/